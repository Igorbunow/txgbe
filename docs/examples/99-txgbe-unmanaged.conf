# Place as: /etc/NetworkManager/conf.d/99-txgbe-unmanaged.conf
# Then run: systemctl reload NetworkManager
# This prevents NetworkManager from deleting manual test IP addresses on link flap.
[keyfile]
unmanaged-devices=interface-name:enp8s0f0;interface-name:enp8s0f1;mac:6C:B3:11:02:00:96;mac:6C:B3:11:02:00:97
